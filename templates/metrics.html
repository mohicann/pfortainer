{{template "base" .}}
{{define "title"}}주요 메트릭 - pfortainer{{end}}
{{define "pagetitle"}}주요 메트릭{{end}}

{{define "content"}}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>
  .gauge-wrap {
    background: #fff; border-radius: 8px; border: 1px solid rgba(0,0,0,.07);
    padding: 1.1rem; text-align: center;
  }
  .gauge-wrap canvas { max-width: 160px; max-height: 160px; }
  .gauge-label { font-size: .72rem; color: #6c757d; text-transform: uppercase; letter-spacing: .06em; margin-top: .4rem; }
  .gauge-val   { font-size: 1.5rem; font-weight: 700; line-height: 1; margin-top: .15rem; }
  .gauge-sub   { font-size: .7rem; color: #adb5bd; margin-top: .1rem; }
  .chart-card  {
    background: #fff; border-radius: 8px; border: 1px solid rgba(0,0,0,.07);
  }
  .chart-card-header {
    padding: .65rem 1rem; border-bottom: 1px solid #e9ecef;
    display: flex; align-items: center; justify-content: space-between;
  }
  .chart-card-body { padding: .75rem 1rem 1rem; }
  .upd { font-size: .7rem; color: #adb5bd; }
</style>

<!-- ── 도넛 게이지 (5초 갱신) ──────────────────────────────────────────── -->
<div class="row g-3 mb-4" id="gauges-row">
  <div class="col-6 col-md-3">
    <div class="gauge-wrap">
      <canvas id="g-cpu"></canvas>
      <div class="gauge-label">CPU</div>
      <div class="gauge-val" id="gv-cpu">—</div>
      <div class="gauge-sub" id="gs-cpu">&nbsp;</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="gauge-wrap">
      <canvas id="g-ram"></canvas>
      <div class="gauge-label">메모리</div>
      <div class="gauge-val" id="gv-ram">—</div>
      <div class="gauge-sub" id="gs-ram">&nbsp;</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="gauge-wrap">
      <canvas id="g-zdata"></canvas>
      <div class="gauge-label">zdata 풀</div>
      <div class="gauge-val" id="gv-zdata">—</div>
      <div class="gauge-sub" id="gs-zdata">&nbsp;</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="gauge-wrap">
      <canvas id="g-zboot"></canvas>
      <div class="gauge-label">zboot 풀</div>
      <div class="gauge-val" id="gv-zboot">—</div>
      <div class="gauge-sub" id="gs-zboot">&nbsp;</div>
    </div>
  </div>
</div>

<!-- ── 시계열 차트 (30초 갱신) ──────────────────────────────────────────── -->
<div class="row g-3">
  <div class="col-12 col-lg-6">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="fw-semibold" style="font-size:.875rem"><i class="bi bi-ethernet me-2" style="color:#4d9eff"></i>네트워크 (igc0)</span>
        <span class="upd" id="upd-net"></span>
      </div>
      <div class="chart-card-body"><canvas id="c-net" height="110"></canvas></div>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="fw-semibold" style="font-size:.875rem"><i class="bi bi-hdd me-2" style="color:#51cf66"></i>디스크 I/O</span>
        <span class="upd" id="upd-disk"></span>
      </div>
      <div class="chart-card-body"><canvas id="c-disk" height="110"></canvas></div>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="fw-semibold" style="font-size:.875rem"><i class="bi bi-cpu me-2" style="color:#ff6b6b"></i>CPU 히스토리</span>
        <span class="upd" id="upd-cpuline"></span>
      </div>
      <div class="chart-card-body"><canvas id="c-cpuline" height="110"></canvas></div>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="fw-semibold" style="font-size:.875rem"><i class="bi bi-database me-2" style="color:#cc5de8"></i>ZFS ARC</span>
        <span class="upd" id="upd-zfs"></span>
      </div>
      <div class="chart-card-body"><canvas id="c-zfs" height="110"></canvas></div>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="fw-semibold" style="font-size:.875rem"><i class="bi bi-bar-chart-steps me-2" style="color:#ffd43b"></i>Load Average</span>
        <span class="upd" id="upd-load"></span>
      </div>
      <div class="chart-card-body"><canvas id="c-load" height="110"></canvas></div>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="fw-semibold" style="font-size:.875rem"><i class="bi bi-bullseye me-2" style="color:#20c997"></i>ZFS ARC 히트율</span>
        <span class="upd" id="upd-zfshits"></span>
      </div>
      <div class="chart-card-body"><canvas id="c-zfshits" height="110"></canvas></div>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="fw-semibold" style="font-size:.875rem"><i class="bi bi-shield-lock me-2" style="color:#4d9eff"></i>Tailscale</span>
        <span class="upd" id="upd-ts"></span>
      </div>
      <div class="chart-card-body"><canvas id="c-ts" height="110"></canvas></div>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="fw-semibold" style="font-size:.875rem"><i class="bi bi-diagram-2 me-2" style="color:#ff6b6b"></i>TCP 활성 연결</span>
        <span class="upd" id="upd-tcp"></span>
      </div>
      <div class="chart-card-body"><canvas id="c-tcp" height="110"></canvas></div>
    </div>
  </div>
</div>

<script>
// ── 공통 유틸 ─────────────────────────────────────────────────────────────
function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0') + ':' +
         d.getSeconds().toString().padStart(2,'0');
}
function fmtBytes(b, decimals=1) {
  if (b < 1024) return b.toFixed(0) + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(decimals) + ' KB';
  if (b < 1024*1024*1024) return (b/1024/1024).toFixed(decimals) + ' MB';
  return (b/1024/1024/1024).toFixed(decimals) + ' GB';
}
function setUpd(id) {
  const el = document.getElementById(id);
  if (el) el.textContent = new Date().toLocaleTimeString('ko-KR');
}
async function fetchND(chart, after, points) {
  const r = await fetch(`/api/metrics/data?chart=${chart}&after=${after}&points=${points}`);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
function latestRow(data) {
  return data[0] ?? null;
}

// ── 도넛 게이지 팩토리 ────────────────────────────────────────────────────
const GAUGE_BG = '#f0f2f5';
function makeGauge(id, color) {
  return new Chart(document.getElementById(id).getContext('2d'), {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [0, 100],
        backgroundColor: [color, GAUGE_BG],
        borderWidth: 0,
        hoverOffset: 0
      }]
    },
    options: {
      cutout: '72%',
      animation: { duration: 400 },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      events: []
    }
  });
}

function updateGauge(chart, pct) {
  const p = Math.min(100, Math.max(0, pct));
  chart.data.datasets[0].data = [p, 100 - p];
  chart.update();
}

const gCpu   = makeGauge('g-cpu',   '#4d9eff');
const gRam   = makeGauge('g-ram',   '#51cf66');
const gZdata = makeGauge('g-zdata', '#ff6b6b');
const gZboot = makeGauge('g-zboot', '#ffd43b');

// ── 게이지 갱신 함수 (5초) ────────────────────────────────────────────────
async function refreshGaugeCPU() {
  try {
    const d = await fetchND('system.cpu', -5, 2);
    const row = latestRow(d.data);
    if (!row) return;
    const pct = row.slice(1).reduce((a,b) => a+b, 0);
    updateGauge(gCpu, pct);
    document.getElementById('gv-cpu').textContent = pct.toFixed(1) + '%';
  } catch(e) { console.error('gauge cpu', e); }
}

async function refreshGaugeRAM() {
  try {
    const d = await fetchND('system.ram', -5, 2);
    const row = latestRow(d.data);
    if (!row) return;
    const labels = d.labels.slice(1);
    let total = 0, used = 0;
    labels.forEach((lbl, i) => {
      const v = Math.abs(row[i+1]);
      total += v;
      if (lbl !== 'free') used += v;
    });
    const pct = total > 0 ? used/total*100 : 0;
    updateGauge(gRam, pct);
    document.getElementById('gv-ram').textContent = pct.toFixed(1) + '%';
    document.getElementById('gs-ram').textContent = fmtBytes(used*1024*1024) + ' / ' + fmtBytes(total*1024*1024);
  } catch(e) { console.error('gauge ram', e); }
}

// chart returns [ts, utilization%, usedMiB, totalMiB]
async function refreshGaugePool(chart, gObj, valId, subId) {
  try {
    const d = await fetchND(chart, -5, 2);
    const row = latestRow(d.data);
    if (!row) return;
    const pct = row[1];
    updateGauge(gObj, pct);
    document.getElementById(valId).textContent = pct.toFixed(1) + '%';
    document.getElementById(subId).textContent =
      fmtBytes(row[2]*1024*1024) + ' / ' + fmtBytes(row[3]*1024*1024);
  } catch(e) { console.error('gauge pool', chart, e); }
}

async function refreshAllGauges() {
  await Promise.allSettled([
    refreshGaugeCPU(),
    refreshGaugeRAM(),
    refreshGaugePool('zfspool.zdata', gZdata, 'gv-zdata', 'gs-zdata'),
    refreshGaugePool('zfspool.zboot', gZboot, 'gv-zboot', 'gs-zboot'),
  ]);
}

// ── 시계열 차트 공통 옵션 ─────────────────────────────────────────────────
const lineDefaults = {
  tension: 0.3, pointRadius: 0, borderWidth: 1.8, fill: false
};
const COLORS = ['#4d9eff','#ff6b6b','#51cf66','#ffd43b','#cc5de8','#20c997'];

function makeLineChart(id, yTickCb) {
  return new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      animation: false,
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12 } } },
      scales: {
        x: { ticks: { maxTicksLimit: 6, font: { size: 9 } } },
        y: { ticks: { font: { size: 9 }, callback: yTickCb } }
      }
    }
  });
}

function applyLineData(chart, d, transform) {
  const rows = [...d.data].reverse();
  const labels = d.labels.slice(1);
  chart.data.labels = rows.map(r => fmtTime(r[0]));
  if (chart.data.datasets.length === 0) {
    chart.data.datasets = labels.map((lbl, i) => ({
      ...lineDefaults,
      label: lbl,
      data: [],
      borderColor: COLORS[i % COLORS.length],
    }));
  }
  labels.forEach((_, i) => {
    chart.data.datasets[i].data = rows.map(r => transform(r[i+1]));
  });
  chart.update('none');
}

// ── 시계열 차트 인스턴스 ──────────────────────────────────────────────────
const cNet    = makeLineChart('c-net',    v => v.toFixed(1) + ' KB/s');
const cDisk   = makeLineChart('c-disk',   v => v.toFixed(1) + ' KB/s');
const cZfs    = makeLineChart('c-zfs',    v => v.toFixed(0) + ' MiB');
const cLoad   = makeLineChart('c-load',   v => v.toFixed(2));
const cZfsHits= makeLineChart('c-zfshits',v => v.toFixed(1) + '%');
const cTs     = makeLineChart('c-ts',     v => v.toFixed(1) + ' KB/s');
const cTcp    = makeLineChart('c-tcp',    v => v.toFixed(0));

// CPU 히스토리: 여러 컬럼을 합산해 단일 라인으로
function makeCpuLineChart(id) {
  return new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets: [{
      ...lineDefaults,
      label: 'CPU %',
      data: [],
      borderColor: '#ff6b6b',
      backgroundColor: 'rgba(255,107,107,.08)',
      fill: true,
    }]},
    options: {
      animation: false, responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 6, font: { size: 9 } } },
        y: { min: 0, max: 100, ticks: { font: { size: 9 }, callback: v => v + '%' } }
      }
    }
  });
}
const cCpuLine = makeCpuLineChart('c-cpuline');

async function refreshNet() {
  try {
    const d = await fetchND('net.igc0', -1800, 60);
    applyLineData(cNet, d, v => v);
    setUpd('upd-net');
  } catch(e) { console.error('net', e); }
}

async function refreshDisk() {
  try {
    const d = await fetchND('system.io', -1800, 60);
    applyLineData(cDisk, d, v => v);
    setUpd('upd-disk');
  } catch(e) { console.error('disk', e); }
}

async function refreshCpuLine() {
  try {
    const d = await fetchND('system.cpu', -1800, 60);
    const rows = [...d.data].reverse();
    cCpuLine.data.labels = rows.map(r => fmtTime(r[0]));
    cCpuLine.data.datasets[0].data = rows.map(r => r.slice(1).reduce((a,b)=>a+b,0));
    cCpuLine.update('none');
    setUpd('upd-cpuline');
  } catch(e) { console.error('cpuline', e); }
}

async function refreshZfs() {
  try {
    const d = await fetchND('zfs.arc_size', -1800, 60);
    applyLineData(cZfs, d, v => v);
    setUpd('upd-zfs');
  } catch(e) { console.error('zfs', e); }
}

async function refreshLoad() {
  try {
    const d = await fetchND('system.load', -1800, 60);
    applyLineData(cLoad, d, v => v);
    setUpd('upd-load');
  } catch(e) { console.error('load', e); }
}

async function refreshZfsHits() {
  try {
    const d = await fetchND('zfs.hits', -1800, 60);
    applyLineData(cZfsHits, d, v => v);
    setUpd('upd-zfshits');
  } catch(e) { console.error('zfshits', e); }
}

async function refreshTailscale() {
  try {
    const d = await fetchND('net.tailscale0', -1800, 60);
    applyLineData(cTs, d, v => v);
    setUpd('upd-ts');
  } catch(e) { console.error('tailscale', e); }
}

async function refreshTcp() {
  try {
    const d = await fetchND('ipv4.tcpsock', -1800, 60);
    applyLineData(cTcp, d, v => v);
    setUpd('upd-tcp');
  } catch(e) { console.error('tcp', e); }
}

async function refreshAllLines() {
  await Promise.allSettled([
    refreshNet(), refreshDisk(), refreshCpuLine(), refreshZfs(),
    refreshLoad(), refreshZfsHits(), refreshTailscale(), refreshTcp(),
  ]);
}

// ── 스케줄 ────────────────────────────────────────────────────────────────
refreshAllGauges();
setInterval(refreshAllGauges, 5000);

refreshAllLines();
setInterval(refreshAllLines, 30000);
</script>
{{end}}
