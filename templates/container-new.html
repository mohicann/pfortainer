{{define "content"}}
<style>
  .create-card {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #dee2e6;
    overflow: hidden;
  }
  .create-card .nav-tabs {
    border-bottom: 1px solid #dee2e6;
    background: #f8f9fa;
    padding: 0.5rem 1rem 0;
  }
  .create-card .tab-content { padding: 1.25rem; }
  .create-card .nav-tabs .nav-link {
    font-size: .88rem; color: #6c757d; border-radius: 6px 6px 0 0;
  }
  .create-card .nav-tabs .nav-link.active {
    color: #0d6efd; font-weight: 600; background: #fff;
    border-color: #dee2e6 #dee2e6 #fff;
  }
  .file-loader {
    display: flex; align-items: center; gap: .5rem;
    padding: .5rem .75rem;
    background: #f8f9fa; border: 1px solid #dee2e6;
    border-radius: 6px 6px 0 0; border-bottom: none;
  }
  .file-loader label { font-size: .78rem; color: #6c757d; white-space: nowrap; margin: 0; }
  .file-loader input { flex: 1; font-family: 'SFMono-Regular', Consolas, monospace; font-size: .78rem; }
  .file-loader .load-msg { font-size: .75rem; min-width: 100px; }
  .file-editor {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: .82rem; background: #1e2430; color: #c9d1d9;
    border: 1px solid #30363d; border-radius: 0 0 6px 6px;
    resize: vertical; width: 100%; padding: .75rem;
    min-height: 280px; line-height: 1.5;
  }
  .file-editor:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 2px rgba(13,110,253,.15); }

  /* 파일 브라우저 모달 */
  .fb-breadcrumb { font-size: .78rem; margin-bottom: .5rem; word-break: break-all; }
  .fb-breadcrumb a { color: #0d6efd; cursor: pointer; text-decoration: none; }
  .fb-breadcrumb a:hover { text-decoration: underline; }
  .fb-breadcrumb span { color: #6c757d; }
  .fb-list { max-height: 360px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 6px; }
  .fb-item {
    display: flex; align-items: center; gap: .5rem;
    padding: .4rem .75rem; cursor: pointer; font-size: .85rem;
    border-bottom: 1px solid #f0f0f0;
  }
  .fb-item:last-child { border-bottom: none; }
  .fb-item:hover { background: #f0f4ff; }
  .fb-item.fb-dir { color: #0d6efd; font-weight: 500; }
  .fb-item.fb-file { color: #212529; }
  .fb-item.fb-selected { background: #e8f0fe; }
  .fb-item i { font-size: .9rem; flex-shrink: 0; }
  .fb-spinner { text-align: center; padding: 2rem; color: #6c757d; font-size: .85rem; }

  /* 로그 패널 */
  .log-panel { background: #0d1117; border-radius: 8px; border: 1px solid #30363d; overflow: hidden; margin-top: 1.25rem; }
  .log-header { display: flex; align-items: center; justify-content: space-between; padding: .5rem 1rem; background: #161b22; border-bottom: 1px solid #30363d; font-size: .8rem; color: #8b949e; }
  .log-output { padding: .75rem 1rem; max-height: 420px; overflow-y: auto; font-family: 'SFMono-Regular', Consolas, monospace; font-size: .78rem; line-height: 1.6; }
  .log-line  { color: #c9d1d9; white-space: pre-wrap; word-break: break-all; }
  .log-error { color: #f85149; white-space: pre-wrap; word-break: break-all; }
  .log-done-ok  { margin: .5rem 0 0; padding: .4rem .75rem; background: rgba(46,160,67,.15); border: 1px solid rgba(46,160,67,.4); border-radius: 5px; color: #3fb950; font-size: .82rem; font-weight: 600; }
  .log-done-fail{ margin: .5rem 0 0; padding: .4rem .75rem; background: rgba(248,81,73,.12); border: 1px solid rgba(248,81,73,.4); border-radius: 5px; color: #f85149; font-size: .82rem; font-weight: 600; }
  .log-spinner { display: inline-block; width: .75rem; height: .75rem; border: 2px solid #444c56; border-top-color: #58a6ff; border-radius: 50%; animation: spin .6s linear infinite; margin-right: .4rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<!-- 파일 브라우저 모달 -->
<div class="modal fade" id="fileBrowserModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title mb-0"><i class="bi bi-folder2-open me-2"></i>파일 선택</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="fb-breadcrumb" id="fbBreadcrumb"></div>
        <div class="fb-list" id="fbList">
          <div class="fb-spinner"><i class="bi bi-hourglass-split"></i> 로딩 중...</div>
        </div>
      </div>
      <div class="modal-footer py-2">
        <div class="me-auto text-muted" style="font-size:.78rem; font-family:monospace" id="fbSelectedPath">선택된 파일 없음</div>
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-primary btn-sm" id="fbConfirm" disabled>선택</button>
      </div>
    </div>
  </div>
</div>

<div class="mb-3">
  <a href="/containers" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> 컨테이너 목록
  </a>
</div>

<div class="create-card">
  <ul class="nav nav-tabs" id="createTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="tab-dockerfile" data-bs-toggle="tab"
              data-bs-target="#pane-dockerfile" type="button" role="tab">
        <i class="bi bi-file-code me-1"></i>Dockerfile
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-compose" data-bs-toggle="tab"
              data-bs-target="#pane-compose" type="button" role="tab">
        <i class="bi bi-stack me-1"></i>docker-compose.yml
      </button>
    </li>
  </ul>

  <div class="tab-content">
    <!-- Dockerfile 탭 -->
    <div class="tab-pane fade show active" id="pane-dockerfile" role="tabpanel">
      <div class="mb-3 d-flex align-items-center gap-3">
        <label class="form-label mb-0 text-nowrap fw-semibold" style="font-size:.85rem">이미지 태그</label>
        <input type="text" id="imageTag" class="form-control form-control-sm" style="max-width:280px"
               placeholder="예: myapp:latest (빈 칸이면 태그 없음)">
      </div>

      <label class="form-label fw-semibold mb-1" style="font-size:.85rem">Dockerfile</label>
      <div class="file-loader">
        <label>파일 경로</label>
        <input type="text" id="dfPath" class="form-control form-control-sm" placeholder="/path/to/Dockerfile">
        <button class="btn btn-outline-secondary btn-sm" onclick="openBrowser('dfPath','dockerfileContent','dfMsg')">
          <i class="bi bi-folder2-open me-1"></i>불러오기
        </button>
        <button class="btn btn-outline-primary btn-sm" onclick="saveFile('dfPath','dockerfileContent','dfMsg')">
          <i class="bi bi-floppy me-1"></i>저장
        </button>
        <span id="dfMsg" class="load-msg text-muted"></span>
      </div>
      <textarea id="dockerfileContent" class="file-editor" spellcheck="false"
                placeholder="FROM alpine&#10;RUN apk add --no-cache curl&#10;CMD [&quot;sh&quot;]"></textarea>

      <div class="mt-3">
        <button id="btnBuild" class="btn btn-primary btn-sm px-4">
          <i class="bi bi-hammer me-1"></i>이미지 빌드
        </button>
        <span class="text-muted ms-3" style="font-size:.8rem">빌드 완료 후 이미지 목록에서 컨테이너를 생성하세요.</span>
      </div>
    </div>

    <!-- docker-compose.yml 탭 -->
    <div class="tab-pane fade" id="pane-compose" role="tabpanel">
      <label class="form-label fw-semibold mb-1" style="font-size:.85rem">docker-compose.yml</label>
      <div class="file-loader">
        <label>파일 경로</label>
        <input type="text" id="composePath" class="form-control form-control-sm" placeholder="/path/to/docker-compose.yml">
        <button class="btn btn-outline-secondary btn-sm" onclick="openBrowser('composePath','composeContent','composeMsg')">
          <i class="bi bi-folder2-open me-1"></i>불러오기
        </button>
        <button class="btn btn-outline-primary btn-sm" onclick="saveFile('composePath','composeContent','composeMsg')">
          <i class="bi bi-floppy me-1"></i>저장
        </button>
        <span id="composeMsg" class="load-msg text-muted"></span>
      </div>
      <textarea id="composeContent" class="file-editor" spellcheck="false"
                placeholder="services:&#10;  web:&#10;    image: nginx:alpine&#10;    ports:&#10;      - &quot;8080:80&quot;"></textarea>

      <div class="mt-3">
        <button id="btnCompose" class="btn btn-success btn-sm px-4">
          <i class="bi bi-play-fill me-1"></i>스택 실행
        </button>
        <span class="text-muted ms-3" style="font-size:.8rem"><code>podman-compose up -d</code> 실행 후 컨테이너가 생성됩니다.</span>
      </div>
    </div>
  </div>
</div>

<!-- 로그 패널 (초기 숨김) -->
<div class="log-panel d-none" id="logPanel">
  <div class="log-header">
    <span id="logTitle"><span class="log-spinner" id="logSpinner"></span>실행 중...</span>
    <button class="btn btn-link btn-sm p-0 text-secondary" id="btnClear" style="font-size:.75rem">지우기</button>
  </div>
  <div class="log-output" id="logOutput"></div>
</div>

<script>
// ── 파일 브라우저 모달 ─────────────────────────────────────────────────────────
(function () {
  let _pathInputId, _textareaId, _msgId;
  let _selectedPath = null;
  let _modal = null;
  function getModal() {
    if (!_modal) _modal = new bootstrap.Modal(document.getElementById('fileBrowserModal'));
    return _modal;
  }
  const fbList     = document.getElementById('fbList');
  const fbBc       = document.getElementById('fbBreadcrumb');
  const fbSelected = document.getElementById('fbSelectedPath');
  const fbConfirm  = document.getElementById('fbConfirm');

  window.openBrowser = function (pathInputId, textareaId, msgId) {
    _pathInputId = pathInputId;
    _textareaId  = textareaId;
    _msgId       = msgId;
    _selectedPath = null;
    fbSelected.textContent = '선택된 파일 없음';
    fbConfirm.disabled = true;
    const startPath = document.getElementById(pathInputId).value.trim() || '/';
    // start from parent dir if it's a file path (has extension or known filename)
    const startDir = startPath.endsWith('/') ? startPath : startPath.split('/').slice(0, -1).join('/') || '/';
    navigate(startDir);
    getModal().show();
  };

  async function navigate(path) {
    fbList.innerHTML = '<div class="fb-spinner"><i class="bi bi-hourglass-split"></i> 로딩 중...</div>';
    try {
      const resp = await fetch('/api/files/list?path=' + encodeURIComponent(path));
      const data = await resp.json();
      if (!resp.ok) { fbList.innerHTML = '<div class="fb-spinner text-danger">' + (data.error || '오류') + '</div>'; return; }
      renderBreadcrumb(data.cwd, data.parent);
      renderEntries(data.cwd, data.parent, data.entries || []);
    } catch (e) {
      fbList.innerHTML = '<div class="fb-spinner text-danger">' + e.message + '</div>';
    }
  }

  function renderBreadcrumb(cwd, parent) {
    const parts = cwd === '/' ? [''] : cwd.split('/');
    let html = '';
    let built = '';
    parts.forEach((p, i) => {
      built = i === 0 ? '/' : built.replace(/\/$/, '') + '/' + p;
      const label = i === 0 ? '/' : p;
      if (i === parts.length - 1) {
        html += '<span>' + escHtml(label) + '</span>';
      } else {
        html += '<a onclick="navigate(\'' + escAttr(built) + '\')">' + escHtml(label) + '</a>';
        if (i < parts.length - 2 || parts.length > 2) html += ' <span class="text-muted">/</span> ';
      }
    });
    fbBc.innerHTML = html;
  }

  function renderEntries(cwd, parent, entries) {
    let html = '';
    if (parent && cwd !== '/') {
      html += `<div class="fb-item fb-dir" onclick="navigate('${escAttr(parent)}')">
        <i class="bi bi-arrow-up-circle"></i> <span>..</span>
      </div>`;
    }
    entries.forEach(e => {
      if (e.isDir) {
        html += `<div class="fb-item fb-dir" onclick="navigate('${escAttr(e.path)}')">
          <i class="bi bi-folder-fill text-warning"></i>
          <span>${escHtml(e.name)}</span>
        </div>`;
      } else {
        html += `<div class="fb-item fb-file" id="fbf-${escAttr(e.path)}" onclick="selectFile('${escAttr(e.path)}', this)">
          <i class="bi bi-file-text"></i>
          <span>${escHtml(e.name)}</span>
        </div>`;
      }
    });
    if (!html) html = '<div class="fb-spinner text-muted">폴더가 비어 있습니다.</div>';
    fbList.innerHTML = html;
  }

  window.navigate = navigate;

  window.selectFile = function (path, el) {
    fbList.querySelectorAll('.fb-selected').forEach(x => x.classList.remove('fb-selected'));
    el.classList.add('fb-selected');
    _selectedPath = path;
    fbSelected.textContent = path;
    fbConfirm.disabled = false;
  };

  fbConfirm.addEventListener('click', async () => {
    if (!_selectedPath) return;
    document.getElementById(_pathInputId).value = _selectedPath;
    getModal().hide();
    await loadFileFromPath(_selectedPath, _textareaId, _msgId);
  });

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }
})();

// ── 파일 불러오기 / 저장 ──────────────────────────────────────────────────────
async function loadFileFromPath(path, textareaId, msgId) {
  const msg = document.getElementById(msgId);
  msg.textContent = '불러오는 중...'; msg.className = 'load-msg text-muted';
  try {
    const resp = await fetch('/api/files/download?path=' + encodeURIComponent(path));
    if (!resp.ok) {
      msg.textContent = (await resp.text()) || ('오류 ' + resp.status);
      msg.className = 'load-msg text-danger'; return;
    }
    document.getElementById(textareaId).value = await resp.text();
    msg.textContent = '불러오기 완료'; msg.className = 'load-msg text-success';
  } catch (e) {
    msg.textContent = e.message; msg.className = 'load-msg text-danger';
  }
}

async function saveFile(pathId, textareaId, msgId) {
  const path    = document.getElementById(pathId).value.trim();
  const content = document.getElementById(textareaId).value;
  const msg     = document.getElementById(msgId);
  if (!path) { msg.textContent = '경로를 입력하세요.'; msg.className = 'load-msg text-warning'; return; }
  msg.textContent = '저장 중...'; msg.className = 'load-msg text-muted';
  try {
    const resp = await fetch('/api/files/save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path, content }),
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) { msg.textContent = data.error || ('오류 ' + resp.status); msg.className = 'load-msg text-danger'; return; }
    msg.textContent = '저장 완료'; msg.className = 'load-msg text-success';
  } catch (e) {
    msg.textContent = e.message; msg.className = 'load-msg text-danger';
  }
}

// ── 로그 스트리밍 ─────────────────────────────────────────────────────────────
(function () {
  const logPanel   = document.getElementById('logPanel');
  const logOutput  = document.getElementById('logOutput');
  const logTitle   = document.getElementById('logTitle');
  const logSpinner = document.getElementById('logSpinner');

  document.getElementById('btnClear').addEventListener('click', () => {
    logOutput.innerHTML = ''; logPanel.classList.add('d-none');
  });

  function appendLog(msg) {
    if (msg.type === 'done') {
      const ok = msg.line === '0';
      logSpinner.style.display = 'none';
      logTitle.innerHTML = ok
        ? '<i class="bi bi-check-circle-fill text-success me-1"></i>완료'
        : '<i class="bi bi-x-circle-fill text-danger me-1"></i>실패';
      const banner = document.createElement('div');
      banner.className = ok ? 'log-done-ok' : 'log-done-fail';
      banner.textContent = ok ? '✅ 작업이 성공적으로 완료되었습니다.' : '❌ 작업 중 오류가 발생했습니다.';
      logOutput.appendChild(banner);
      logOutput.scrollTop = logOutput.scrollHeight;
      return;
    }
    const line = document.createElement('div');
    line.className = msg.type === 'error' ? 'log-error' : 'log-line';
    line.textContent = (msg.type === 'error' ? '[오류] ' : '[진행] ') + msg.line;
    logOutput.appendChild(line);
    logOutput.scrollTop = logOutput.scrollHeight;
  }

  async function runStream(url, formData, title) {
    logPanel.classList.remove('d-none');
    logOutput.innerHTML = '';
    logSpinner.style.display = '';
    logTitle.innerHTML = '<span class="log-spinner"></span>' + title;
    let resp;
    try {
      resp = await fetch(url, { method: 'POST', body: formData });
    } catch (e) {
      appendLog({ type: 'error', line: '연결 오류: ' + e.message });
      appendLog({ type: 'done', line: '1' }); return;
    }
    if (!resp.ok) {
      appendLog({ type: 'error', line: (await resp.text()) || ('HTTP ' + resp.status) });
      appendLog({ type: 'done', line: '1' }); return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const raw of lines) {
        const t = raw.trim();
        if (t) try { appendLog(JSON.parse(t)); } catch (_) {}
      }
    }
    if (buf.trim()) try { appendLog(JSON.parse(buf.trim())); } catch (_) {}
  }

  document.getElementById('btnBuild').addEventListener('click', () => {
    const dockerfile = document.getElementById('dockerfileContent').value.trim();
    if (!dockerfile) { alert('Dockerfile 내용을 입력하세요.'); return; }
    const fd = new FormData();
    fd.append('tag', document.getElementById('imageTag').value.trim());
    fd.append('dockerfile', dockerfile);
    runStream('/api/containers/build', fd, '이미지 빌드 중...');
  });

  document.getElementById('btnCompose').addEventListener('click', () => {
    const compose = document.getElementById('composeContent').value.trim();
    if (!compose) { alert('docker-compose.yml 내용을 입력하세요.'); return; }
    const fd = new FormData();
    fd.append('compose', compose);
    runStream('/api/compose/up', fd, 'podman-compose up 실행 중...');
  });
})();
</script>
