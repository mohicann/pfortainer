{{define "login"}}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — pfortainer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#1a2332; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card {
      background:#fff; border-radius:12px; padding:2.5rem 2.25rem;
      width:100%; max-width:360px; box-shadow:0 24px 60px rgba(0,0,0,.35);
    }
    .icon {
      width:52px; height:52px; background:#1a73e8; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.5rem; color:#fff; margin:0 auto 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="text-center mb-4">
      <div class="icon">⬡</div>
      <h5 class="fw-bold mb-1">pfortainer</h5>
      <p class="text-muted small mb-0">FreeBSD Podman 관리</p>
    </div>
    {{if .Error}}
    <div class="alert alert-danger py-2 small mb-3">{{.Error}}</div>
    {{end}}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label small fw-semibold text-muted">비밀번호</label>
        <input type="password" name="password" class="form-control" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">로그인</button>
    </form>
  </div>
</body>
</html>
{{end}}
