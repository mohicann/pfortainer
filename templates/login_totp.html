<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2단계 인증 — pfortainer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #1a2332; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 12px; padding: 2.2rem 2rem; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.35); }
    .login-logo { font-size: 1.15rem; font-weight: 700; color: #1a2332; margin-bottom: 1.6rem; text-align: center; }
    .otp-input { font-size: 1.6rem; letter-spacing: .4em; text-align: center; font-family: monospace; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-shield-lock-fill me-2" style="color:#4d9eff"></i>2단계 인증
    </div>
    {{if .Error}}
    <div class="alert alert-danger py-2 mb-3" style="font-size:.875rem">{{.Error}}</div>
    {{end}}
    <p class="text-muted text-center mb-3" style="font-size:.85rem">
      Authenticator 앱의 6자리 코드를 입력하세요.
    </p>
    <form method="POST" action="/login/totp" autocomplete="off">
      <div class="mb-3">
        <input type="text" name="code" class="form-control otp-input"
               maxlength="6" pattern="\d{6}" inputmode="numeric"
               placeholder="000000" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary w-100">확인</button>
    </form>
    <div class="text-center mt-3">
      <a href="/login" style="font-size:.8rem;color:#6c757d">← 로그인으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
