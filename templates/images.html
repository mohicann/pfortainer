{{define "title"}}Images — pfortainer{{end}}
{{define "pagetitle"}}Images{{end}}
{{define "content"}}
<div class="card-table">
  <div class="ct-header">
    <span class="fw-semibold" style="font-size:.88rem">
      이미지 <span class="badge bg-secondary ms-1">{{len .Images}}</span>
    </span>
  </div>
  <table class="table table-hover mb-0">
    <thead>
      <tr><th>이름:태그</th><th>Image ID</th><th>크기</th><th>생성일</th></tr>
    </thead>
    <tbody>
      {{range .Images}}
      <tr>
        <td>
          {{if .Tags}}
            {{range .Tags}}<div class="fw-semibold" style="font-size:.875rem">{{.}}</div>{{end}}
          {{else}}
            <span class="text-muted fst-italic" style="font-size:.85rem">untagged</span>
          {{end}}
        </td>
        <td><span class="mono">{{.ShortID}}</span></td>
        <td><small>{{.Size}}</small></td>
        <td><small class="text-muted">{{.Created}}</small></td>
      </tr>
      {{else}}
      <tr><td colspan="4" class="text-center text-muted py-4">이미지 없음</td></tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}
